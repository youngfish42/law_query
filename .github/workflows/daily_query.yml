name: Daily Query

on:
  schedule:
    # Beijing 07:00 is UTC 23:00 (previous day)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Search keyword'
        required: false
        default: '智能'

permissions:
  contents: write

jobs:
  query:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          playwright install --with-deps chromium

      - name: Run query
        run: |
          # Use input keyword if triggered manually, otherwise default to '智能'
          KEYWORD="${{ inputs.keyword }}"
          if [ -z "$KEYWORD" ]; then
            KEYWORD="智能"
          fi
          
          echo "Searching for: $KEYWORD"
          # Run query, outputting to "法规.csv" (will merge with existing)
          python query.py --keyword "$KEYWORD" --out "法规.csv"

      - name: Commit and push if changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 法规.csv
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update 法规.csv with latest query results"
            git push
          fi

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: query-results
          path: 法规.csv
