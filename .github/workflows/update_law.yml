name: Update Law Query Data

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 0:00 (北京时间 8:00) 运行
  workflow_dispatch:      # 允许手动触发
    inputs:
      keyword:
        description: '检索关键词（留空则依次检索所有默认关键词）'
        required: false
        default: ''
      enrich_existing:
        description: '仅补全已有条目的制定机关/效力位阶（不执行新搜索，true/false）'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          playwright install --with-deps chromium

      - name: Run query script
        run: |
          ENRICH="${{ inputs.enrich_existing }}"
          echo "Enrich existing: $ENRICH"

          if [ "$ENRICH" = "true" ]; then
            # 仅补全已有条目的详情信息，不执行新搜索
            python query.py --enrich-existing --out "法规.csv"
          else
            # 确定要查询的关键词列表
            KEYWORD_INPUT="${{ inputs.keyword }}"
            if [ -n "$KEYWORD_INPUT" ]; then
              # 手动触发时指定了关键词，只查询该关键词
              KEYWORDS=("$KEYWORD_INPUT")
            else
              # 未指定关键词时，依次查询所有默认关键词（每个关键词重新启动浏览器）
              KEYWORDS=("智能" "数智化" "AI" "高质量数据" "大模型" "算力" "工业互联网" "新型产业" "未来产业" "数字化")
            fi

            for KW in "${KEYWORDS[@]}"; do
              echo "=========================================="
              echo "正在查询关键词: $KW"
              echo "=========================================="
              python query.py --keyword "$KW" --out "法规.csv"
            done
          fi
          
      - name: Generate Update Time
        run: |
          # 生成 meta.json 包含北京时间
          python -c "import json; from datetime import datetime, timedelta, timezone; tz = timezone(timedelta(hours=8)); now = datetime.now(tz).strftime('%Y-%m-%d %H:%M'); print(json.dumps({'updated_at': now}, ensure_ascii=False))" > meta.json

      - name: Generate RSS Feed
        run: |
          python generate_rss.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add 法规.csv meta.json feed.xml
          
          # Check for staged changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update law data and timestamp"
            git push
          fi
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: query-results
          path: |
            法规.csv
            meta.json
            feed.xml
